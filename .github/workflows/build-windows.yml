name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install FFmpeg
        run: choco install ffmpeg -y

      - name: Build exe
        shell: powershell
        run: .\windows\build_windows.ps1

      - uses: actions/upload-artifact@v4
        with:
          name: ValorantHighlightClipper-Windows
          path: release/ValorantHighlightClipper.exe
